version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused

  settings:
    staticcheck:
      checks:
        - "all"
        # SA1019: corev1.Endpoints deprecated in k8s v1.33+ (use EndpointSlice).
        # Migration tracked separately; suppress to avoid blocking every PR.
        - "-SA1019"

  exclusions:
    rules:
      # WIP handler files — functions implemented but not yet wired to routes.
      # Suppress `unused` until route registration is complete.
      - path: "internal/httpapi/handlers_export\\.go"
        linters: [unused]
      - path: "internal/httpapi/handlers_network\\.go"
        linters: [unused]
      - path: "internal/httpapi/handlers_cache\\.go"
        linters: [unused]
      - path: "internal/httpapi/handlers_clusters\\.go"
        linters: [unused]
      - path: "internal/k8s/list\\.go"
        linters: [unused]
