version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused

  settings:
    staticcheck:
      checks:
        - "all"
        # SA1019: corev1.Endpoints deprecated in k8s v1.33+; migration tracked separately.
        - "-SA1019"
        # ST1000/ST1020/ST1021: package and exported-symbol doc comment style.
        # Enforcing strict doc format is a separate documentation task.
        - "-ST1000"
        - "-ST1020"
        - "-ST1021"

  exclusions:
    rules:
      # WIP handler files — functions implemented but not yet wired to routes.
      # Suppress `unused` until route registration is complete.
      - path: "internal/httpapi/handlers_export\\.go"
        linters: [unused]
      - path: "internal/httpapi/handlers_network\\.go"
        linters: [unused]
      - path: "internal/httpapi/handlers_cache\\.go"
        linters: [unused]
      - path: "internal/httpapi/handlers_clusters\\.go"
        linters: [unused]
      - path: "internal/k8s/list\\.go"
        linters: [unused]
