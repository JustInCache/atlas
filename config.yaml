# Atlas Production Configuration - AWS EKS
# Deployed on ECS Fargate with ElastiCache Valkey

# Server configuration
server:
  port: 8080

# Cache configuration - ElastiCache Valkey (Serverless)
cache:
  type: redis
  redis:
    addr: "atlas-cache-s9gajm.serverless.usw2.cache.amazonaws.com:6379"
    password: ""
    db: 0
    tls: true

# Feature flags
features:
  multi_cluster: true

# EKS Clusters
clusters:
  - id: qa10
    name: "qa10"
    kubeconfig: /app/kubeconfigs/qa10.yaml
    api_server: https://BF98936C7C74560F33F6E27420467B77.gr7.us-west-2.eks.amazonaws.com
    region: us-west-2

  - id: qa11
    name: "qa11"
    kubeconfig: /app/kubeconfigs/qa11.yaml
    api_server: https://F12E980CFD9C64B0D85A7C85FE5973D2.gr7.us-west-2.eks.amazonaws.com
    region: us-west-2