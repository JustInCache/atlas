# Atlas Configuration Example
# Copy this file to config.yaml and customize for your environment

# Cache configuration
cache:
  # Type: "memory" (single-instance) or "redis" (multi-instance/multi-cluster)
  type: memory
  
  # Redis configuration (only used when type=redis)
  redis:
    addr: "localhost:6379"
    password: ""
    db: 0

# Cluster configuration
# Leave empty for single-cluster mode (default)
# Add multiple clusters for multi-cluster support
clusters: []
  # Example multi-cluster configuration:
  # - id: prod-us-east
  #   name: Production US East
  #   kubeconfig: /path/to/kubeconfig/prod-us-east
  #   api_server: https://k8s-api.us-east.example.com
  #   region: us-east-1
  #   
  # - id: prod-eu-west
  #   name: Production EU West
  #   kubeconfig: /path/to/kubeconfig/prod-eu-west
  #   api_server: https://k8s-api.eu-west.example.com
  #   region: eu-west-1
  #   
  # - id: staging
  #   name: Staging
  #   kubeconfig: /path/to/kubeconfig/staging
  #   api_server: https://k8s-api-staging.example.com
  #   region: us-east-1

# Server configuration
server:
  port: 8080
  
# Feature flags
features:
  multi_cluster: false  # Enable multi-cluster support
