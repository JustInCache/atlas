# Atlas Production Configuration - AWS EKS
# This configuration is designed for multi-cluster EKS deployments

# Server configuration
server:
  port: 8080

# Cache configuration - Redis recommended for production
cache:
  type: redis
  redis:
    addr: "redis:6379"
    password: ""  # Set via REDIS_PASSWORD env var
    db: 0

# Feature flags
features:
  multi_cluster: true

# EKS Clusters
# Kubeconfig paths are relative to the container filesystem
clusters:
  - id: prod-us-east-1
    name: "Production US East 1"
    kubeconfig: /app/kubeconfigs/eks-prod-us-east-1.yaml
    api_server: https://XXXXX.gr7.us-east-1.eks.amazonaws.com
    region: us-east-1

  - id: prod-us-west-2
    name: "Production US West 2"
    kubeconfig: /app/kubeconfigs/eks-prod-us-west-2.yaml
    api_server: https://XXXXX.gr7.us-west-2.eks.amazonaws.com
    region: us-west-2

  - id: prod-eu-west-1
    name: "Production EU West 1"
    kubeconfig: /app/kubeconfigs/eks-prod-eu-west-1.yaml
    api_server: https://XXXXX.d2.eu-west-1.eks.amazonaws.com
    region: eu-west-1

  - id: staging-us-east-1
    name: "Staging US East 1"
    kubeconfig: /app/kubeconfigs/eks-staging-us-east-1.yaml
    api_server: https://XXXXX.gr7.us-east-1.eks.amazonaws.com
    region: us-east-1

# Notes:
# 1. Replace XXXXX with your actual EKS cluster IDs
# 2. Kubeconfig files must be generated with: aws eks update-kubeconfig --name <cluster-name> --kubeconfig <file>
# 3. For production, ensure kubeconfig files use IAM authenticator (default for EKS)
# 4. Mount kubeconfigs directory as read-only volume in docker-compose
# 5. AWS credentials must be available in the container (via IAM role or mounted credentials)
