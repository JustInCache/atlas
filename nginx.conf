events {
    worker_connections 1024;
}

http {
    upstream atlas_backend {
        # Round-robin load balancing
        server atlas-prod-us:8080;
        server atlas-prod-eu:8080;
        
        # Health check parameters
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Increase buffer sizes for large responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # User identifier for session persistence (optional)
        # This ensures the same user goes to the same backend
        # Useful for sticky sessions if needed
        # ip_hash;

        location / {
            proxy_pass http://atlas_backend;
        }

        # Health check endpoint
        location /healthz {
            proxy_pass http://atlas_backend/healthz;
            access_log off;
        }

        # Cache static assets
        location /static/ {
            proxy_pass http://atlas_backend/static/;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }
}
